<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U10 Skill Assessment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        #pin-screen {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; padding: 2rem;
        }
        #pin-screen h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        #pin-screen p { color: #999; margin-bottom: 2rem; }
        .pin-input {
            background: #2a2f2a; border: 1px solid #3a3f3a; border-radius: 8px;
            padding: 1rem 1.5rem; font-size: 1.5rem; color: #e0e0e0;
            text-align: center; letter-spacing: 0.5rem; width: 200px; margin-bottom: 1rem;
        }
        .pin-input:focus { outline: none; border-color: #4a8; }
        .pin-error { color: #e55; font-size: 0.85rem; display: none; }
        .pin-btn {
            background: #4a8; color: #fff; border: none; border-radius: 8px;
            padding: 0.75rem 2rem; font-size: 1rem; cursor: pointer; margin-top: 1rem;
        }
        .pin-btn:hover { background: #5b9; }
        #app { display: none; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
        .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
        .header-icon {
            width: 48px; height: 48px; background: #2a3a2a; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }
        .header-text h1 { font-size: 1.4rem; font-weight: 600; }
        .header-text p { color: #999; font-size: 0.85rem; }
        .legend { display: flex; gap: 1.5rem; margin: 1.5rem 0 2rem; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-needs { background: #e55; }
        .dot-developing { background: #e90; }
        .dot-ontrack { background: #48f; }
        .dot-strong { background: #4a8; }
        /* TEAM SELECTOR */
        .team-bar {
            background: #242924; border: 1px solid #3a3f3a; border-radius: 10px;
            padding: 1rem 1.25rem; margin-bottom: 1.5rem;
            display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
        }
        .team-bar label { font-size: 0.8rem; color: #999; }
        .team-select {
            background: #2a2f2a; border: 1px solid #3a3f3a; border-radius: 8px;
            padding: 0.5rem 0.75rem; font-size: 0.9rem; color: #e0e0e0; cursor: pointer; appearance: auto;
        }
        .team-select:focus { outline: none; border-color: #4a8; }
        .team-btn {
            background: #3a3f3a; border: none; border-radius: 6px;
            padding: 0.45rem 0.85rem; font-size: 0.8rem; color: #ccc; cursor: pointer;
        }
        .team-btn:hover { background: #4a4f4a; }
        .team-btn.active { background: #4a8; color: #fff; }
        /* PLAYER INFO */
        .player-info { display: grid; grid-template-columns: 1fr auto auto; gap: 1rem; margin-bottom: 2rem; }
        .field-label { font-size: 0.8rem; color: #999; margin-bottom: 0.4rem; }
        .field-input {
            background: #2a2f2a; border: 1px solid #3a3f3a; border-radius: 8px;
            padding: 0.75rem 1rem; font-size: 1rem; color: #e0e0e0; width: 100%;
        }
        .field-input:focus { outline: none; border-color: #4a8; }
        select.field-input { cursor: pointer; appearance: auto; }
        /* CATEGORY CARDS */
        .category-card {
            background: #242924; border: 1px solid #3a3f3a; border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .category-title {
            display: flex; align-items: center; gap: 0.6rem;
            font-size: 1.1rem; font-weight: 600; margin-bottom: 1.25rem;
        }
        .skill-row { margin-bottom: 1.25rem; }
        .skill-name { font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem; }
        .rating-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .rating-btn {
            background: #3a3f3a; border: none; border-radius: 8px;
            padding: 0.5rem 1rem; font-size: 0.8rem; color: #ccc; cursor: pointer; transition: all 0.15s;
        }
        .rating-btn:hover { background: #4a4f4a; }
        .rating-btn.selected-1 { background: #e55; color: #fff; }
        .rating-btn.selected-2 { background: #e90; color: #fff; }
        .rating-btn.selected-3 { background: #48f; color: #fff; }
        .rating-btn.selected-4 { background: #4a8; color: #fff; }
        .notes-input {
            background: #1a1f1a; border: 1px solid #3a3f3a; border-radius: 8px;
            padding: 0.75rem 1rem; font-size: 0.85rem; color: #e0e0e0;
            width: 100%; margin-top: 1rem; resize: vertical; min-height: 60px;
        }
        .notes-input:focus { outline: none; border-color: #4a8; }
        /* SUMMARY */
        .summary-section {
            background: #242924; border: 1px solid #3a3f3a; border-radius: 12px;
            padding: 1.5rem; margin-top: 2rem;
        }
        .summary-section h2 { font-size: 1.1rem; margin-bottom: 1rem; }
        .summary-bar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
        .summary-label { font-size: 0.8rem; width: 180px; flex-shrink: 0; }
        .bar-track { flex: 1; height: 8px; background: #3a3f3a; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
        .bar-value { font-size: 0.8rem; width: 30px; text-align: right; color: #999; }
        /* ACTIONS */
        .actions { display: flex; gap: 1rem; margin-top: 2rem; flex-wrap: wrap; }
        .btn { border: none; border-radius: 8px; padding: 0.75rem 1.5rem; font-size: 0.9rem; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #4a8; color: #fff; }
        .btn-primary:hover { background: #5b9; }
        .btn-secondary { background: #3a3f3a; color: #e0e0e0; }
        .btn-secondary:hover { background: #4a4f4a; }
        .btn-danger { background: #533; color: #e55; }
        .btn-danger:hover { background: #644; }
        /* HISTORY */
        .history-section { margin-top: 2rem; }
        .history-section h2 { font-size: 1.1rem; margin-bottom: 1rem; }
        .history-item {
            background: #242924; border: 1px solid #3a3f3a; border-radius: 8px;
            padding: 1rem; margin-bottom: 0.75rem; display: flex;
            justify-content: space-between; align-items: center; cursor: pointer;
        }
        .history-item:hover { border-color: #4a8; }
        .history-meta { font-size: 0.85rem; }
        .history-date { color: #999; font-size: 0.75rem; }
        .history-team { color: #4a8; font-size: 0.7rem; margin-top: 2px; }
        .history-actions { display: flex; gap: 0.5rem; }
        .history-btn {
            background: #3a3f3a; border: none; border-radius: 6px;
            padding: 0.4rem 0.75rem; font-size: 0.75rem; color: #ccc; cursor: pointer;
        }
        .history-btn:hover { background: #4a4f4a; }
        .history-btn.delete { color: #e55; }
        .toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            background: #4a8; color: #fff; padding: 0.75rem 1.5rem; border-radius: 8px;
            font-size: 0.9rem; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
        @media (max-width: 600px) {
            .player-info { grid-template-columns: 1fr; }
            .summary-label { width: 120px; }
            .rating-btn { padding: 0.45rem 0.75rem; font-size: 0.75rem; }
            .team-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<!-- PIN SCREEN -->
<div id="pin-screen">
    <h1>&#9917; U10 Skill Assessment</h1>
    <p>Coaching staff only</p>
    <input type="password" class="pin-input" id="pin-input" maxlength="4" placeholder="----" inputmode="numeric">
    <p class="pin-error" id="pin-error">Incorrect PIN. Try again.</p>
    <button class="pin-btn" onclick="checkPin()">Enter</button>
</div>

<!-- MAIN APP -->
<div id="app">
    <div class="header">
        <div class="header-icon">&#9917;</div>
        <div class="header-text">
            <h1>U10 &#8212; Skill Assessment</h1>
            <p>Coaching staff only &middot; Development planner</p>
        </div>
    </div>

    <!-- TEAM SELECTOR -->
    <div class="team-bar">
        <label>Team:</label>
        <select class="team-select" id="team-select" onchange="switchTeam()"></select>
        <button class="team-btn" onclick="addTeam()">+ Add Team</button>
        <button class="team-btn" onclick="renameTeam()">Rename</button>
        <button class="team-btn delete" style="color:#e55" onclick="deleteTeam()">Delete Team</button>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="legend-dot dot-needs"></span> Needs work</div>
        <div class="legend-item"><span class="legend-dot dot-developing"></span> Developing</div>
        <div class="legend-item"><span class="legend-dot dot-ontrack"></span> On track</div>
        <div class="legend-item"><span class="legend-dot dot-strong"></span> Strong</div>
    </div>
    <div class="player-info">
        <div>
            <div class="field-label">Player name</div>
            <input type="text" class="field-input" id="player-name" placeholder="Enter player name">
        </div>
        <div>
            <div class="field-label">Position</div>
            <select class="field-input" id="player-position">
                <option value="">Select</option>
                <option value="Goalkeeper">Goalkeeper</option>
                <option value="Defender">Defender</option>
                <option value="Midfielder">Midfielder</option>
                <option value="Forward">Forward</option>
            </select>
        </div>
        <div>
            <div class="field-label">Parent code</div>
            <input type="text" class="field-input" id="parent-code" placeholder="e.g. TEO2025" style="text-transform:uppercase">
        </div>
    </div>

    <div id="categories-container"></div>

    <div class="summary-section" id="summary-section">
        <h2>&#128202; Summary</h2>
        <div id="summary-bars"></div>
    </div>

    <div class="actions">
        <button class="btn btn-primary" onclick="saveAssessment()">&#128190; Save Assessment</button>
        <button class="btn btn-secondary" onclick="shareWithParent()">&#128279; Share with Parent</button>
        <button class="btn btn-secondary" onclick="exportAssessment()">&#128203; Export as Text</button>
        <button class="btn btn-danger" onclick="clearForm()">&#128465; Clear Form</button>
    </div>

    <div class="history-section" id="history-section">
        <h2>&#128193; Saved Assessments</h2>
        <div id="history-list"></div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script>
// ===== CONFIG =====
const PIN_HASH = '03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4'; // "1234"
const SHEETS_API = 'https://script.google.com/macros/s/AKfycby-LlplW_fk18yuhzUuzWjSmmff9W00xjw1480pb8JVGIV4v8Qp_0Zw68K23pdJuOPY/exec';
const WRITE_SALT = 'soccer-eval-write'; // salt used to derive write token from PIN
var writeToken = ''; // set after PIN auth

// ===== SKILL CATEGORIES (U10 appropriate) =====
var categories = [
    {
        name: 'Dribbling & ball control',
        icon: '\u26A1',
        skills: [
            'Close control under pressure',
            'Change of direction with the ball',
            'Weak foot comfort',
            'Speed with the ball',
            'Shielding the ball',
            'Finding space off the ball',
            'Awareness of teammates'
        ]
    },
    {
        name: 'Passing & receiving',
        icon: '\uD83C\uDFAF',
        skills: [
            'Short passing accuracy',
            'First touch / receiving',
            'Passing with weak foot',
            'Weight of pass',
            'Playing under pressure',
            'Decision making speed',
            'Communication on the field'
        ]
    },
    {
        name: 'Shooting & finishing',
        icon: '\uD83E\uDD45',
        skills: [
            'Shooting technique',
            'Shot power / striking through the ball',
            'Accuracy on target',
            'Weak foot shooting',
            'Composure in front of goal',
            '1v1 finishing'
        ]
    },
    {
        name: 'Defending',
        icon: '\uD83D\uDEE1\uFE0F',
        skills: [
            'Body positioning',
            'Tackling technique',
            'Tracking runners',
            'Intercepting passes',
            '1v1 defending',
            'Positioning in formation'
        ]
    },
    {
        name: 'Physical & athletic',
        icon: '\uD83C\uDFC3',
        skills: [
            'Speed / acceleration',
            'Agility & balance',
            'Stamina / endurance',
            'Strength for age',
            'Recovery between efforts'
        ]
    },
    {
        name: 'Attitude & coachability',
        icon: '\uD83D\uDCAA',
        skills: [
            'Effort in training',
            'Listens to instructions',
            'Resilience after mistakes',
            'Teamwork & encouragement',
            'Willingness to try new things'
        ]
    }
];

var ratingLabels = ['Needs work', 'Developing', 'On track', 'Strong'];

// ===== TEAM MANAGEMENT =====
var allAssessments = []; // in-memory cache

function getTeams() {
    var teams = JSON.parse(localStorage.getItem('teams') || '[]');
    if (teams.length === 0) {
        teams = ['Team A'];
        localStorage.setItem('teams', JSON.stringify(teams));
    }
    return teams;
}

function getActiveTeam() {
    return localStorage.getItem('activeTeam') || getTeams()[0];
}

function setActiveTeam(team) {
    localStorage.setItem('activeTeam', team);
}

function renderTeamSelect() {
    var teams = getTeams();
    var active = getActiveTeam();
    var sel = document.getElementById('team-select');
    sel.innerHTML = teams.map(function(t) {
        return '<option value="' + t + '"' + (t === active ? ' selected' : '') + '>' + t + '</option>';
    }).join('');
}

function switchTeam() {
    var sel = document.getElementById('team-select');
    setActiveTeam(sel.value);
    clearFormSilent();
    renderHistory();
}

function addTeam() {
    var name = prompt('New team name:');
    if (!name || !name.trim()) return;
    var teams = getTeams();
    if (teams.indexOf(name.trim()) !== -1) { showToast('Team already exists'); return; }
    teams.push(name.trim());
    localStorage.setItem('teams', JSON.stringify(teams));
    setActiveTeam(name.trim());
    renderTeamSelect();
    clearFormSilent();
    renderHistory();
    showToast('Team "' + name.trim() + '" created');
}

function renameTeam() {
    var active = getActiveTeam();
    var name = prompt('Rename "' + active + '" to:', active);
    if (!name || !name.trim() || name.trim() === active) return;
    var teams = getTeams();
    var idx = teams.indexOf(active);
    if (idx === -1) return;
    teams[idx] = name.trim();
    localStorage.setItem('teams', JSON.stringify(teams));
    // Update assessments in memory and on server
    allAssessments.forEach(function(a) {
        if (a.team === active) {
            a.team = name.trim();
            sheetsPost({ action: 'save', id: a.id, team: a.team, playerName: a.playerName, position: a.position, date: a.date, ratings: a.ratings, notes: a.notes });
        }
    });
    setActiveTeam(name.trim());
    renderTeamSelect();
    renderHistory();
    showToast('Renamed to "' + name.trim() + '"');
}

function deleteTeam() {
    var active = getActiveTeam();
    var teams = getTeams();
    if (teams.length <= 1) { showToast('Cannot delete the only team'); return; }
    if (!confirm('Delete team "' + active + '" and all its assessments?')) return;
    // Delete from server
    allAssessments.filter(function(a) { return a.team === active; }).forEach(function(a) {
        sheetsPost({ action: 'delete', id: a.id });
    });
    allAssessments = allAssessments.filter(function(a) { return a.team !== active; });
    teams = teams.filter(function(t) { return t !== active; });
    localStorage.setItem('teams', JSON.stringify(teams));
    setActiveTeam(teams[0]);
    renderTeamSelect();
    clearFormSilent();
    renderHistory();
    showToast('Team deleted');
}

// ===== PIN AUTH =====
async function hashPin(pin) {
    var encoder = new TextEncoder();
    var data = encoder.encode(pin);
    var hashBuffer = await crypto.subtle.digest('SHA-256', data);
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}

async function generateWriteToken(pin) {
    var encoder = new TextEncoder();
    var data = encoder.encode(pin + ':' + WRITE_SALT);
    var hashBuffer = await crypto.subtle.digest('SHA-256', data);
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}

async function checkPin() {
    var pin = document.getElementById('pin-input').value;
    var hash = await hashPin(pin);
    if (hash === PIN_HASH) {
        writeToken = await generateWriteToken(pin);
        sessionStorage.setItem('authenticated', 'true');
        sessionStorage.setItem('writeToken', writeToken);
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadAllAssessments();
    } else {
        document.getElementById('pin-error').style.display = 'block';
        document.getElementById('pin-input').value = '';
    }
}

document.getElementById('pin-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPin();
});

if (sessionStorage.getItem('authenticated') === 'true') {
    writeToken = sessionStorage.getItem('writeToken') || '';
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
}

// ===== RENDER CATEGORIES =====
function renderCategories() {
    var container = document.getElementById('categories-container');
    container.innerHTML = '';
    categories.forEach(function(cat, catIdx) {
        var skillsHtml = cat.skills.map(function(skill, skillIdx) {
            var btns = ratingLabels.map(function(label, rIdx) {
                return '<button class="rating-btn" data-cat="' + catIdx + '" data-skill="' + skillIdx + '" data-rating="' + (rIdx + 1) + '" onclick="setRating(' + catIdx + ',' + skillIdx + ',' + (rIdx + 1) + ',this)">' + label + '</button>';
            }).join('');
            return '<div class="skill-row"><div class="skill-name">' + skill + '</div><div class="rating-buttons">' + btns + '</div></div>';
        }).join('');
        container.innerHTML += '<div class="category-card"><div class="category-title"><span class="category-icon">' + cat.icon + '</span>' + cat.name + '</div>' + skillsHtml + '<textarea class="notes-input" id="notes-' + catIdx + '" placeholder="Coach notes for ' + cat.name.toLowerCase() + '..."></textarea></div>';
    });
}

// ===== RATINGS STATE =====
var ratings = {};

function setRating(catIdx, skillIdx, rating, btn) {
    var key = catIdx + '-' + skillIdx;
    ratings[key] = rating;
    var siblings = btn.parentElement.querySelectorAll('.rating-btn');
    siblings.forEach(function(b) { b.className = 'rating-btn'; });
    btn.classList.add('selected-' + rating);
    updateSummary();
}

// ===== SUMMARY =====
function updateSummary() {
    var container = document.getElementById('summary-bars');
    container.innerHTML = '';
    var colors = ['#e55', '#e90', '#48f', '#4a8'];
    categories.forEach(function(cat, catIdx) {
        var total = 0, count = 0;
        cat.skills.forEach(function(_, skillIdx) {
            var key = catIdx + '-' + skillIdx;
            if (ratings[key]) { total += ratings[key]; count++; }
        });
        var avg = count > 0 ? total / count : 0;
        var pct = (avg / 4) * 100;
        var colorIdx = Math.min(Math.floor(avg) - 1, 3);
        var color = avg > 0 ? colors[Math.max(0, colorIdx)] : '#3a3f3a';
        container.innerHTML += '<div class="summary-bar"><span class="summary-label">' + cat.icon + ' ' + cat.name + '</span><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%; background:' + color + '"></div></div><span class="bar-value">' + (avg > 0 ? avg.toFixed(1) : '\u2014') + '</span></div>';
    });
}

// ===== GOOGLE SHEETS API =====
function sheetsGet(params) {
    var url = SHEETS_API + '?' + Object.keys(params).map(function(k) {
        return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    }).join('&');
    return fetch(url).then(function(r) { return r.json(); });
}

function sheetsPost(body) {
    body.token = writeToken;
    return fetch(SHEETS_API, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(body)
    }).then(function(r) { return r.json(); });
}

function loadAllAssessments() {
    showToast('Loading...');
    return sheetsGet({ action: 'getAll' }).then(function(res) {
        if (res.success) {
            allAssessments = res.data;
            // Sync teams from data
            var teamSet = {};
            allAssessments.forEach(function(a) { if (a.team) teamSet[a.team] = true; });
            var teams = getTeams();
            Object.keys(teamSet).forEach(function(t) {
                if (teams.indexOf(t) === -1) teams.push(t);
            });
            localStorage.setItem('teams', JSON.stringify(teams));
            renderTeamSelect();
            renderHistory();
        }
    }).catch(function(err) {
        showToast('Offline — using local data');
        allAssessments = JSON.parse(localStorage.getItem('assessments') || '[]');
        renderHistory();
    });
}

// ===== SAVE / LOAD =====
function getFormData() {
    return {
        playerName: document.getElementById('player-name').value,
        position: document.getElementById('player-position').value,
        parentCode: document.getElementById('parent-code').value.trim().toUpperCase(),
        team: getActiveTeam(),
        ratings: JSON.parse(JSON.stringify(ratings)),
        notes: categories.map(function(_, i) { return document.getElementById('notes-' + i).value; }),
        date: new Date().toISOString()
    };
}

function saveAssessment() {
    var data = getFormData();
    if (!data.playerName.trim()) { showToast('Please enter a player name'); return; }
    showToast('Saving...');
    sheetsPost({
        action: 'save',
        team: data.team,
        playerName: data.playerName,
        position: data.position,
        parentCode: data.parentCode,
        date: data.date,
        ratings: data.ratings,
        notes: data.notes
    }).then(function(res) {
        if (res.success) {
            data.id = res.id;
            allAssessments.unshift(data);
            // Also save locally as backup
            localStorage.setItem('assessments', JSON.stringify(allAssessments));
            showToast('Saved to ' + data.team + ' \u2714');
            renderHistory();
        } else {
            showToast('Save failed — try again');
        }
    }).catch(function() {
        // Offline fallback
        allAssessments.unshift(data);
        localStorage.setItem('assessments', JSON.stringify(allAssessments));
        showToast('Saved locally (offline)');
        renderHistory();
    });
}

function loadAssessment(index) {
    var saved = getTeamAssessments();
    var data = saved[index];
    if (!data) return;
    document.getElementById('player-name').value = data.playerName;
    document.getElementById('player-position').value = data.position;
    document.getElementById('parent-code').value = data.parentCode || '';
    ratings = JSON.parse(JSON.stringify(data.ratings));
    if (data.notes) {
        data.notes.forEach(function(note, i) {
            var el = document.getElementById('notes-' + i);
            if (el) el.value = note;
        });
    }
    document.querySelectorAll('.rating-btn').forEach(function(btn) { btn.className = 'rating-btn'; });
    Object.keys(ratings).forEach(function(key) {
        var parts = key.split('-');
        var btn = document.querySelector('.rating-btn[data-cat="' + parts[0] + '"][data-skill="' + parts[1] + '"][data-rating="' + ratings[key] + '"]');
        if (btn) btn.classList.add('selected-' + ratings[key]);
    });
    updateSummary();
    showToast('Assessment loaded');
}

function deleteAssessment(index, e) {
    e.stopPropagation();
    if (!confirm('Delete this assessment?')) return;
    var saved = getTeamAssessments();
    var item = saved[index];
    if (!item) return;
    if (item.id) {
        sheetsPost({ action: 'delete', id: item.id });
    }
    allAssessments = allAssessments.filter(function(a) { return a !== item && a.id !== item.id; });
    localStorage.setItem('assessments', JSON.stringify(allAssessments));
    renderHistory();
    showToast('Deleted');
}

function getTeamAssessments() {
    var team = getActiveTeam();
    return allAssessments.filter(function(a) { return a.team === team; });
}

function renderHistory() {
    var saved = getTeamAssessments();
    var container = document.getElementById('history-list');
    var team = getActiveTeam();
    document.querySelector('.history-section h2').textContent = '\uD83D\uDCC1 ' + team + ' \u2014 Saved Assessments';

    if (saved.length === 0) {
        container.innerHTML = '<p style="color:#999;font-size:0.85rem;">No saved assessments for ' + team + ' yet.</p>';
        return;
    }
    container.innerHTML = saved.map(function(item, idx) {
        return '<div class="history-item" onclick="loadAssessment(' + idx + ')"><div><div class="history-meta">' + item.playerName + ' \u2014 ' + (item.position || 'No position') + '</div><div class="history-date">' + new Date(item.date).toLocaleDateString() + ' ' + new Date(item.date).toLocaleTimeString() + '</div></div><div class="history-actions"><button class="history-btn delete" onclick="deleteAssessment(' + idx + ', event)">Delete</button></div></div>';
    }).join('');
}

// ===== EXPORT =====
function shareWithParent() {
    var data = getFormData();
    if (!data.playerName.trim()) { showToast('Please enter a player name first'); return; }
    if (!data.parentCode) { showToast('Set a parent code first (e.g. TEO2025)'); return; }

    var baseUrl = window.location.href.replace(/\/[^\/]*$/, '/');
    var parentUrl = baseUrl + 'parent.html';

    var shareText = 'Player Assessment for ' + data.playerName + '\n';
    shareText += 'Access code: ' + data.parentCode + '\n';
    shareText += 'Link: ' + parentUrl + '\n';
    shareText += '\nEnter the access code on the page to view the report.';

    navigator.clipboard.writeText(shareText).then(function() {
        showToast('Parent info copied! Code: ' + data.parentCode);
    }).catch(function() {
        prompt('Send this to the parent:\nAccess code: ' + data.parentCode, parentUrl);
    });
}

function exportAssessment() {
    var data = getFormData();
    if (!data.playerName.trim()) { showToast('Please enter a player name first'); return; }
    var text = 'U10 SKILL ASSESSMENT\n';
    text += '====================\n';
    text += 'Team: ' + data.team + '\n';
    text += 'Player: ' + data.playerName + '\n';
    text += 'Position: ' + (data.position || 'N/A') + '\n';
    text += 'Date: ' + new Date().toLocaleDateString() + '\n\n';
    categories.forEach(function(cat, catIdx) {
        text += cat.icon + ' ' + cat.name.toUpperCase() + '\n';
        text += '------------------------------\n';
        cat.skills.forEach(function(skill, skillIdx) {
            var key = catIdx + '-' + skillIdx;
            var r = ratings[key];
            var label = r ? ratingLabels[r - 1] : 'Not rated';
            text += '  ' + skill + ': ' + label + '\n';
        });
        var note = data.notes[catIdx];
        if (note) text += '  Notes: ' + note + '\n';
        text += '\n';
    });
    text += '\nTOP IMPROVEMENT AREAS\n------------------------------\n';
    var weakSkills = [];
    categories.forEach(function(cat, catIdx) {
        cat.skills.forEach(function(skill, skillIdx) {
            var key = catIdx + '-' + skillIdx;
            if (ratings[key] && ratings[key] <= 2) {
                weakSkills.push({ skill: skill, category: cat.name, rating: ratings[key] });
            }
        });
    });
    weakSkills.sort(function(a, b) { return a.rating - b.rating; });
    if (weakSkills.length > 0) {
        weakSkills.slice(0, 5).forEach(function(s) {
            text += '  - ' + s.skill + ' (' + s.category + ') \u2014 ' + ratingLabels[s.rating - 1] + '\n';
        });
    } else { text += '  No areas flagged.\n'; }

    navigator.clipboard.writeText(text).then(function() {
        showToast('Copied to clipboard!');
    }).catch(function() {
        var blob = new Blob([text], { type: 'text/plain' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'assessment-' + data.playerName.replace(/\s+/g, '-').toLowerCase() + '.txt';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Downloaded!');
    });
}

// ===== CLEAR =====
function clearForm() {
    if (!confirm('Clear all fields?')) return;
    clearFormSilent();
}

function clearFormSilent() {
    document.getElementById('player-name').value = '';
    document.getElementById('player-position').value = '';
    document.getElementById('parent-code').value = '';
    ratings = {};
    document.querySelectorAll('.rating-btn').forEach(function(b) { b.className = 'rating-btn'; });
    document.querySelectorAll('.notes-input').forEach(function(el) { el.value = ''; });
    updateSummary();
}

// ===== TOAST =====
function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2500);
}

// ===== INIT =====
renderTeamSelect();
renderCategories();
updateSummary();
loadAllAssessments();
</script>
